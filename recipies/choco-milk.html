    <h1>Kaju Katli Recipie</h1>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQyQdmtEzps3zaE2-XZyaHUErWzfwOFyjQZRw&s" alt="Choco milk" width="320" height="320">
    <h3>Kaju Katli</h3>
    <p>
        Chocolate milk
    </p>
    <h3>Ingridients</h3>
    <ol>
        <li>1 Mug Milk</li>
        <li>2 tsp choco powder</li>
        <li>2 cubes of chocolate</li>
        <li>Sugar as per taste</li>
    </ol>
    <h3>Steps</h3>
    <ul>
        <li>Warm the milk</li>
        <li>Add other remianing Ingridients</li>
        <li>Simmer it for 3-5 min</li>
        <li>Filter it out in mug</li>
        <li>Enjoy</li>
    </ul>
